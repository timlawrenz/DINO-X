name: pancreas-ct
modality: ct
organs:
  - pancreas
  - abdomen
source_url: https://wiki.cancerimagingarchive.net/display/Public/Pancreas-CT
license: CC-BY-3.0
license_url: https://wiki.cancerimagingarchive.net/display/Public/Pancreas-CT
redistribution: prohibited
redistribution_note: >
  TCIA Data Usage Agreement prohibits redistribution.
  Users must download directly from TCIA after agreeing to the DUA.
attribution_required: true
attribution: >
  Data from The Cancer Imaging Archive (TCIA).
  Cite Roth et al. (2015) and the TCIA DOI: https://doi.org/10.7937/K9/TCIA.2016.tNB1kqBU
total_slices: 17764
total_series: 75
pixel_spacing_range: [0.6641, 0.9766]
slice_thickness_range: [0.5, 1.0]
hu_range: [-1024, 3071]
annotations:
  - pancreas_segmentation
preprocessing:
  format: png_16bit
  hu_shift: 32768
  scale: 10
  index_csv: _index/index.csv
citation: "Roth HR, et al. DeepOrgan: Multi-level Deep Convolutional Networks for Automated Pancreas Segmentation. MICCAI 2015."
notes: >
  75 abdominal contrast-enhanced 3D CT scans (portal venous phase) from 82 available
  (5 failed download from TCIA). Healthy kidney donors and patients without major
  abdominal pathology. Uniform thin-slice spacing (mostly 1.0mm).
