name: rsna-ich
modality: ct
organs:
  - brain
  - intracranial
source_url: https://www.kaggle.com/c/rsna-intracranial-hemorrhage-detection/data
license: CC-BY-SA-4.0
license_url: https://creativecommons.org/licenses/by-sa/4.0/
redistribution: restricted
redistribution_note: >
  While CC-BY-SA-4.0, this data originates from a Kaggle competition.
  Kaggle competition rules may impose additional restrictions on
  redistribution. Users should download from Kaggle directly.
attribution_required: true
attribution: >
  RSNA Intracranial Hemorrhage Detection Challenge (2019).
  Original data: https://www.kaggle.com/c/rsna-intracranial-hemorrhage-detection
total_slices: 41450
total_series: 674
pixel_spacing_range: [0.3, 0.7]
slice_thickness_range: [1.0, 5.0]
hu_range: [-1024, 3071]
annotations:
  - intracranial_hemorrhage
  - intraparenchymal
  - intraventricular
  - subdural
  - extradural
  - subarachnoid
preprocessing:
  format: png_16bit
  hu_shift: 32768
  scale: 10
  index_csv: _index/index.csv
citation: >
  Radiological Society of North America & MD.ai (2019).
  RSNA Intracranial Hemorrhage Detection Challenge. Kaggle.
  https://www.kaggle.com/c/rsna-intracranial-hemorrhage-detection
notes: >
  Massive neuro CT dataset from RSNA 2019 challenge. 674 training
  patients with ~61 slices/scan average. Six hemorrhage subtypes
  annotated. Critical for cranial anatomy coverage — fills the gap
  above the neck in pan-organ training. DICOM format with standard
  head CT protocols. Variable slice thickness provides excellent
  ScaleEmbedding anchor points for cranial imaging.
